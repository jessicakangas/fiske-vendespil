<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">

    <!-- COMMIT: Tilføjer Google Font (Cherry Bomb One) -->
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">

    <!-- COMMIT: Opdaterer titel og rydder op i HTML struktur -->
    <title>Fiske Vendespil</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- COMMIT: Opretter grundstruktur for fiske vendespil -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- COMMIT: Opdaterer titel og bruger Cherry Bomb One -->
    <h1 class="cherry-font">Fiske Vendespil</h1>

    <div id="wrapper">

        <!-- COMMIT: Tilføjer Kalle Krabbe som figur i spillet -->
        <img src="img/kallekrabbe.png" class="kallekrabbe" alt="Kalle Krabbe">

        <!-- COMMIT: Tilføjer taleboble med Cherry Bomb One -->
        <div class="kallekrabbe-boble cherry-font">
            Pas på der ikke går fisk i den!
        </div>

        <div class="info">
            <span>
                <strong>Fundne par:</strong>
                <span id="pairsFound">0</span>
            </span>

            <span>
                <strong>Tid:</strong>
                <span id="time">01:00</span>
            </span>
        </div>

        <div id="game"></div>

        <!-- COMMIT: Tilføjer baggrundsmusik til vendespillet -->
        <audio id="baggrundslyd" autoplay loop>
            <source src="sounds/baggrundslyd.m4a" type="audio/mp4">
        </audio>

    </div>

    <script src="memoryscript.js"></script>

</body>
</html>
